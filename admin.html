<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - Disponibilidade de Unidades</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #F0F4FB; color: #1A2240; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #2C3E7A; font-size: 24px; text-align: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2C3E7A; color: white; }
    .btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-disp { background: #1A7A4A; color: white; }
    .btn-vendido { background: #C0392B; color: white; }
    select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
  </style>
  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
  <div class="container">
    <h1>Controle de Disponibilidade</h1>
    <p>Selecione o empreendimento para gerenciar as unidades:</p>
    <select id="empreendimentoSelect" onchange="loadUnits()">
      <option value="CBMC">Medical CBMC</option>
      <option value="TResidence">Timeless Residence</option>
    </select>
    
    <div id="loginSection" style="margin-top: 20px;">
      <h3>Acesso Restrito</h3>
      <input type="email" id="email" placeholder="E-mail do Administrador" style="padding: 8px; margin-right: 10px;">
      <input type="password" id="senha" placeholder="Senha" style="padding: 8px; margin-right: 10px;">
      <button class="btn btn-disp" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="adminPanel" style="display: none;">
      <button class="btn btn-vendido" onclick="fazerLogout()" style="float:right;">Sair</button>
      <table id="unitsTable">
        <thead>
          <tr>
            <th>Unidade</th>
            <th>Status Atual</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="unitsBody">
          <!-- Unidades carregadas aqui via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // ⚠️ COLOQUE AQUI AS CREDENCIAIS DO SEU FIREBASE ⚠️
    const firebaseConfig = {
      apiKey: "AIzaSyAgdIE4CXYmjeNpd_VIkY-7kI9LHrozhVE",
      authDomain: "medical-simulador.firebaseapp.com",
      databaseURL: "https://medical-simulador-default-rtdb.firebaseio.com",
      projectId: "medical-simulador",
      storageBucket: "medical-simulador.firebasestorage.app",
      messagingSenderId: "715692377671",
      appId: "1:715692377671:web:29eed6fc0d53aac2ad5362",
      measurementId: "G-XDMP09ZWST"
    };

    // Inicializa Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadUnits();
      } else {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminPanel').style.display = 'none';
      }
    });

    function fazerLogin() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      auth.signInWithEmailAndPassword(email, senha).catch(error => {
        alert("Erro no login: " + error.message);
      });
    }

    function fazerLogout() {
      auth.signOut();
    }

    function loadUnits() {
      if(!auth.currentUser) return;
      const emp = document.getElementById('empreendimentoSelect').value;
      const tbody = document.getElementById('unitsBody');
      tbody.innerHTML = '<tr><td colspan="3">Carregando dados...</td></tr>';
      
      // Lê o status das unidades do banco de dados
      db.ref('disponibilidade/' + emp).on('value', (snapshot) => {
        const data = snapshot.val() || {};
        renderTable(data, emp);
      });
    }

    // Como as unidades originais estão apenas no index.html, 
    // O ideal é que o admin crie as chaves no banco de dados. 
    // Para simplificar, quando carregar, ele vai buscar a lista.
    function renderTable(data, emp) {
        const tbody = document.getElementById('unitsBody');
        tbody.innerHTML = '';
        
        // Exemplo com algumas unidades fixas para visualização se o banco estiver vazio
        const allUnits = data && Object.keys(data).length > 0 ? Object.keys(data).sort() : ['101', '102', '103', '104', '1401', '1402']; 
        
        allUnits.forEach(unidade => {
            const status = data[unidade] || 'Disponível';
            const btnClass = status === 'Disponível' ? 'btn-vendido' : 'btn-disp';
            const btnText = status === 'Disponível' ? 'Marcar como VENDIDO' : 'Marcar como DISPONÍVEL';
            const newStatus = status === 'Disponível' ? 'Vendido' : 'Disponível';

            tbody.innerHTML += `
              <tr>
                <td>Unidade ${unidade}</td>
                <td><strong>${status}</strong></td>
                <td>
                  <button class="btn ${btnClass}" onclick="mudarStatus('${emp}', '${unidade}', '${newStatus}')">
                    ${btnText}
                  </button>
                </td>
              </tr>
            `;
        });
    }

    function mudarStatus(emp, unidade, novoStatus) {
        db.ref('disponibilidade/' + emp + '/' + unidade).set(novoStatus);
    }
  </script>
</body>
</html>
